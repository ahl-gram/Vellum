name: Deploy site to GitHub Pages

# Builds the site into dist/ and publishes it via the GitHub Pages Actions
# pipeline. Since Sub 5 (#206) `npm run build` is the Astro build: astro:generate
# writes the runtime trees (engine, bundles, atlas/gallery) into public/, then
# `astro build` assembles dist/, which upload-pages-artifact publishes.
#
# Contractual shape (ratified Sub 1 decision doc, #202): hand-rolled npm ci
# pipeline (no withastro/action: the repo has a lockfile and a frozen npm ci
# flow), `path: dist` matches Astro's default outDir, and the custom domain
# (vellum.route12b.net) lives in the repo's Pages settings, not in a CNAME file.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; don't cancel a publish midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Build site into dist/
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
