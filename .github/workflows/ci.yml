name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Test
        run: npm test
      - name: Verify Explorer engine is in sync with source
        run: |
          rm -rf docs/explorer/engine
          npx tsc -p tsconfig.browser.json
          if [ -n "$(git status --porcelain -- docs/explorer/engine)" ]; then
            echo "::error::docs/explorer/engine is stale. Run 'npm run site' and commit the regenerated engine."
            git --no-pager diff -- docs/explorer/engine
            git status --porcelain -- docs/explorer/engine
            exit 1
          fi
      - name: Explorer e2e (headless browser)
        run: npm run test:e2e
        env:
          # ubuntu-latest ships a real (non-snap) Google Chrome here. Point at it
          # explicitly: findBrowser() would otherwise pick /usr/bin/chromium first,
          # which is snap-confined and can't use a --user-data-dir under /tmp.
          VELLUM_BROWSER: /usr/bin/google-chrome
          # Require a browser so a missing one fails the build loud rather than
          # skipping silently (local runs with no browser still skip).
          VELLUM_REQUIRE_BROWSER: '1'
