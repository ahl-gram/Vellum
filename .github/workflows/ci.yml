name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Test
        run: npm test
      # Build the deploy artifact and run the e2e against it, so CI validates the
      # exact dist/ that gets published. (The old engine-sync guard is gone: the
      # engine is no longer committed — every deploy rebuilds it into dist/ — so
      # there is nothing committed left to drift.)
      - name: Build site into dist/
        run: npm run build
      - name: Explorer e2e (headless browser, against dist/)
        run: npm run test:e2e
        env:
          # ubuntu-latest ships a real (non-snap) Google Chrome here. Point at it
          # explicitly: findBrowser() would otherwise pick /usr/bin/chromium first,
          # which is snap-confined and can't use a --user-data-dir under /tmp.
          VELLUM_BROWSER: /usr/bin/google-chrome
          # Require a browser so a missing one fails the build loud rather than
          # skipping silently (local runs with no browser still skip).
          VELLUM_REQUIRE_BROWSER: '1'

  # Sub 3 (#204) parallel track: the same e2e suite, zero check changes, against
  # the Astro-served build (astro:build regenerates the public/ runtime trees and
  # emits to dist/, which the e2e serves by default). Guards the Astro path
  # through the dual-copy window; Sub 5 retires the legacy job above at cutover.
  astro-e2e:
    name: astro build & e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Build the Astro site into dist/
        run: npm run astro:build
      - name: Explorer e2e (headless browser, against the Astro-served dist/)
        run: npm run test:e2e
        env:
          VELLUM_BROWSER: /usr/bin/google-chrome
          VELLUM_REQUIRE_BROWSER: '1'
