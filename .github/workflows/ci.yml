name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Test
        run: npm test
      - name: Verify Explorer engine is in sync with source
        run: |
          rm -rf docs/explorer/engine
          npx tsc -p tsconfig.browser.json
          if [ -n "$(git status --porcelain -- docs/explorer/engine)" ]; then
            echo "::error::docs/explorer/engine is stale. Run 'npm run site' and commit the regenerated engine."
            git --no-pager diff -- docs/explorer/engine
            git status --porcelain -- docs/explorer/engine
            exit 1
          fi
      - name: Explorer e2e (headless browser)
        run: npm run test:e2e
        env:
          # ubuntu-latest ships Google Chrome at /usr/bin/google-chrome, which
          # findBrowser() locates. Require it here so a missing browser fails the
          # build loud rather than skipping silently (local runs still skip).
          VELLUM_REQUIRE_BROWSER: '1'
