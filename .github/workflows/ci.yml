name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Test
        run: npm test
      # Build the deploy artifact and run the e2e against it, so CI validates the
      # exact dist/ that gets published. Since Sub 5 (#206) `npm run build` IS the
      # Astro build: astro:generate refreshes the public/ runtime trees (engine,
      # bundles, showcases), then `astro build` assembles dist/.
      - name: Build site into dist/
        run: npm run build
      - name: Explorer e2e (headless browser, against dist/)
        run: npm run test:e2e
        env:
          # ubuntu-latest ships a real (non-snap) Google Chrome here. Point at it
          # explicitly: findBrowser() would otherwise pick /usr/bin/chromium first,
          # which is snap-confined and can't use a --user-data-dir under /tmp.
          VELLUM_BROWSER: /usr/bin/google-chrome
          # Require a browser so a missing one fails the build loud rather than
          # skipping silently (local runs with no browser still skip).
          VELLUM_REQUIRE_BROWSER: '1'
