<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vellum Explorer — draw your own imaginary world</title>
<meta name="description" content="Generate procedural fantasy maps in your browser. Every seed is a world.">
<style>
  :root { color-scheme: light; }
  body {
    margin: 0; padding: 2rem 1.5rem 4rem;
    background: #efe6cf; color: #3d2f1f;
    font-family: 'Iowan Old Style', 'Palatino', Georgia, serif;
  }
  main { max-width: 1100px; margin-inline: auto; }
  header { text-align: center; margin-bottom: 1.4rem; }
  h1 { font-size: 2rem; letter-spacing: 0.1em; margin: 0; }
  h1 a { color: inherit; text-decoration: none; }
  .tagline { font-style: italic; color: #6b5a40; margin: 0.3rem 0 0; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 0.7rem; justify-content: center;
    align-items: center; margin: 1.2rem 0;
  }
  .controls label { font-size: 0.85rem; letter-spacing: 0.05em; color: #6b5a40; }
  input[type="number"], select, button {
    font-family: inherit; font-size: 0.95rem; color: #3d2f1f;
    background: #f8f1e0; border: 1.5px solid #4a3826; border-radius: 4px;
    padding: 0.4rem 0.6rem;
  }
  input[type="number"] { width: 8.5rem; }
  button { cursor: pointer; }
  button:hover { background: #fff7e4; }
  button.primary { background: #4a3826; color: #f2e8cf; letter-spacing: 0.08em; }
  button.primary:hover { background: #5d4831; }
  .status { text-align: center; font-style: italic; color: #857257;
    min-height: 1.4em; margin-bottom: 0.8rem; }
  #map { max-width: 1100px; margin-inline: auto; }
  #map svg { width: 100%; height: auto; display: block;
    border: 1px solid #b9a77f; box-shadow: 0 12px 34px rgb(61 47 31 / 0.2); }
  .caption { text-align: center; font-style: italic; color: #6b5a40;
    padding-top: 0.6rem; }
  footer { margin-top: 3rem; text-align: center; letter-spacing: 0.25em;
    font-size: 0.72rem; color: #857257; }
  footer a { color: inherit; }
</style>
</head>
<body>
<main>
<header>
  <h1><a href="../">VELLUM</a> EXPLORER</h1>
  <p class="tagline">every seed is a world — draw one</p>
</header>

<div class="controls">
  <label>seed <input id="seed" type="number" min="0" max="4294967295" step="1"></label>
  <button id="random" title="random seed">🎲</button>
  <label>style
    <select id="style">
      <option value="antique" selected>antique</option>
      <option value="topographic">topographic</option>
      <option value="ink">ink</option>
      <option value="nautical">nautical</option>
    </select>
  </label>
  <label>type
    <select id="type">
      <option value="" selected>seed's choice</option>
      <option value="island">island</option>
      <option value="archipelago">archipelago</option>
      <option value="continent">continent</option>
      <option value="citystate">city-state</option>
    </select>
  </label>
  <label>climate
    <select id="band">
      <option value="" selected>seed's choice</option>
      <option value="temperate">temperate</option>
      <option value="tropical">tropical</option>
      <option value="polar">polar</option>
    </select>
  </label>
  <button id="draw" class="primary">Draw</button>
  <button id="download">Download SVG</button>
</div>

<p class="status" id="status"></p>
<div id="map"></div>
<p class="caption" id="caption"></p>

<footer>
  <a href="../">VELLUM</a> ·
  <a href="https://github.com/ahl-gram/Vellum">GITHUB</a> ·
  CHARTS ARE DRAWN IN YOUR BROWSER — NOTHING IS UPLOADED
</footer>
</main>

<script type="module">
import { defaultRecipe, generateWorld } from "./engine/world/generate.js";
import { renderMap } from "./engine/render/map-renderer.js";

const $ = (id) => document.getElementById(id);
const seedInput = $("seed");
const styleSel = $("style");
const typeSel = $("type");
const bandSel = $("band");
const status = $("status");
const mapDiv = $("map");
const caption = $("caption");

let lastSvg = "";
let lastTitle = "";

function randomSeed() {
  return Math.floor(Math.random() * 0xffffffff);
}

function readHash() {
  const params = new URLSearchParams(location.hash.slice(1));
  const seed = Number(params.get("seed"));
  if (Number.isInteger(seed) && seed >= 0) seedInput.value = String(seed);
  const style = params.get("style");
  if (style && [...styleSel.options].some((o) => o.value === style)) {
    styleSel.value = style;
  }
  const type = params.get("type") ?? "";
  if ([...typeSel.options].some((o) => o.value === type)) typeSel.value = type;
  const band = params.get("band") ?? "";
  if ([...bandSel.options].some((o) => o.value === band)) bandSel.value = band;
}

function writeHash() {
  const params = new URLSearchParams();
  params.set("seed", seedInput.value);
  params.set("style", styleSel.value);
  if (typeSel.value) params.set("type", typeSel.value);
  if (bandSel.value) params.set("band", bandSel.value);
  history.replaceState(null, "", "#" + params.toString());
}

function draw() {
  const seed = Number(seedInput.value) >>> 0;
  status.textContent = "Drafting…";
  caption.textContent = "";
  writeHash();
  // let the status paint before the ~half-second of cartography
  setTimeout(() => {
    try {
      const t0 = performance.now();
      const overrides = {};
      if (typeSel.value) overrides.mapType = typeSel.value;
      if (bandSel.value) overrides.band = bandSel.value;
      const recipe = defaultRecipe(seed, overrides);
      const world = generateWorld(recipe);
      lastSvg = renderMap(world, { style: styleSel.value, widthPx: 1500 });
      lastTitle = world.title.title;
      mapDiv.innerHTML = lastSvg;
      const ms = (performance.now() - t0).toFixed(0);
      status.textContent = "";
      caption.textContent =
        `${world.title.title} · ${recipe.mapType} · ${recipe.band} · drawn in ${ms}ms`;
    } catch (err) {
      status.textContent = "The cartographer spilled the ink: " + err.message;
    }
  }, 30);
}

$("draw").addEventListener("click", draw);
$("random").addEventListener("click", () => {
  seedInput.value = String(randomSeed());
  draw();
});
$("download").addEventListener("click", () => {
  if (!lastSvg) return;
  const blob = new Blob([lastSvg], { type: "image/svg+xml" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const slug = lastTitle.toLowerCase().replace(/[^a-z0-9]+/g, "-");
  a.download = `vellum-${seedInput.value}-${styleSel.value}-${slug}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
});
seedInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") draw();
});
for (const sel of [styleSel, typeSel, bandSel]) {
  sel.addEventListener("change", draw);
}

seedInput.value = String(randomSeed());
readHash();
draw();
</script>
</body>
</html>
