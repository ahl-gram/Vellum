<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vellum Explorer — draw your own imaginary world</title>
<meta name="description" content="Generate procedural fantasy maps in your browser. Every seed is a world.">
<style>
  :root { color-scheme: light; }
  body {
    margin: 0; padding: 2rem 1.5rem 4rem;
    background: #efe6cf; color: #3d2f1f;
    font-family: 'Iowan Old Style', 'Palatino', Georgia, serif;
  }
  main { max-width: 1100px; margin-inline: auto; }
  header { text-align: center; margin-bottom: 1.4rem; }
  h1 { font-size: 2rem; letter-spacing: 0.1em; margin: 0; }
  h1 a { color: inherit; text-decoration: none; }
  .tagline { font-style: italic; color: #6b5a40; margin: 0.3rem 0 0; }
  .topnav { font-size: 0.82rem; letter-spacing: 0.12em; color: #857257; margin: 0.9rem 0 0; }
  .topnav a { color: inherit; }
  [aria-current="page"] { font-weight: 700; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 0.7rem; justify-content: center;
    align-items: center; margin: 1.2rem 0;
  }
  .controls label { font-size: 0.85rem; letter-spacing: 0.05em; color: #6b5a40; }
  .controls label.check { display: inline-flex; align-items: center; gap: 0.35rem; }
  .controls input[type="checkbox"] { accent-color: #4a3826; width: 1rem; height: 1rem; }
  .controls .exports { display: inline-flex; gap: 0.7rem; }
  input[type="number"], select, button {
    font-family: inherit; font-size: 0.95rem; color: #3d2f1f;
    background: #f8f1e0; border: 1.5px solid #4a3826; border-radius: 4px;
    padding: 0.4rem 0.6rem;
  }
  input[type="number"] { width: 8.5rem; }
  button { cursor: pointer; }
  button:hover { background: #fff7e4; }
  button.primary { background: #4a3826; color: #f2e8cf; letter-spacing: 0.08em; }
  button.primary:hover { background: #5d4831; }
  .status { text-align: center; font-style: italic; color: #857257;
    min-height: 1.4em; margin-bottom: 0.8rem; }
  #map { max-width: 1100px; margin-inline: auto; }
  #map svg { width: 100%; height: auto; display: block;
    border: 1px solid #b9a77f; box-shadow: 0 12px 34px rgb(61 47 31 / 0.2); }
  .caption { text-align: center; font-style: italic; color: #6b5a40;
    padding-top: 0.6rem; }
  footer { margin-top: 3rem; text-align: center; letter-spacing: 0.25em;
    font-size: 0.72rem; color: #857257; }
  footer a { color: inherit; }
  /* The bound atlas, drawn inline beneath the chart. Mirrors the standalone
     atlas (src/cli/atlas.ts), scoped to #atlas so the CLI bytes stay untouched. */
  #atlas { max-width: 1100px; margin: 2.5rem auto 0; }
  #atlas:empty { margin: 0; }
  #atlas h2 { letter-spacing: 0.06em; border-bottom: 1px solid #b9a77f;
    padding-bottom: 0.3rem; margin-top: 2.6rem; }
  #atlas figure { margin: 1.5rem 0; }
  #atlas figure img { width: 100%; height: auto; display: block;
    border: 1px solid #b9a77f; box-shadow: 0 10px 30px rgb(61 47 31 / 0.18); }
  #atlas figcaption { text-align: center; font-style: italic; color: #6b5a40;
    padding-top: 0.55rem; }
  #atlas .styles { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.25rem; }
  #atlas .themes { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 1.25rem; }
  #atlas table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
  #atlas th { text-align: left; border-bottom: 2px solid #4a3826; padding: 0.45rem 0.6rem; }
  #atlas td { border-bottom: 1px solid #cdbd97; padding: 0.45rem 0.6rem; vertical-align: top; }
  #atlas td.name { font-weight: 600; white-space: nowrap; }
  #atlas td.name.capital { text-transform: uppercase; letter-spacing: 0.06em; }
  #atlas td.note { font-style: italic; color: #54452f; }
  #atlas .realms { font-style: italic; color: #6b5a40; }
  #atlas .banners { display: flex; flex-wrap: wrap; gap: 1.1rem; justify-content: center; }
  #atlas .banner { width: 120px; text-align: center; }
  #atlas .banner svg { width: 100%; height: auto; }
  #atlas .banner figcaption { font-style: italic; color: #6b5a40; font-size: 0.85rem;
    padding-top: 0.35rem; }
</style>
</head>
<body>
<main>
<header>
  <h1><a href="../">VELLUM</a> EXPLORER</h1>
  <p class="tagline">every seed is a world — draw one</p>
  <nav class="topnav">
    <a href="../">Home</a> · <span aria-current="page">Explorer</span> ·
    <a href="../gallery/">Gallery</a> · <a href="../atlas/">Atlas</a> ·
    <a href="../faq/">FAQ</a> ·
    <a href="https://github.com/ahl-gram/Vellum">GitHub</a>
  </nav>
</header>

<div class="controls">
  <label>seed <input id="seed" type="number" min="0" max="4294967295" step="1"></label>
  <button id="random" title="random seed" aria-label="Random seed">🎲</button>
  <label>style
    <select id="style">
      <option value="antique" selected>antique</option>
      <option value="topographic">topographic</option>
      <option value="ink">ink</option>
      <option value="nautical">nautical</option>
    </select>
  </label>
  <label>type
    <select id="type">
      <option value="" selected>seed's choice</option>
      <option value="island">island</option>
      <option value="archipelago">archipelago</option>
      <option value="continent">continent</option>
      <option value="citystate">city-state</option>
    </select>
  </label>
  <label>climate
    <select id="band">
      <option value="" selected>seed's choice</option>
      <option value="temperate">temperate</option>
      <option value="tropical">tropical</option>
      <option value="polar">polar</option>
    </select>
  </label>
  <label>theme
    <select id="theme">
      <option value="" selected>none</option>
      <option value="vegetation">vegetation</option>
      <option value="climate">temperature</option>
      <option value="moisture">rainfall</option>
      <option value="population">population</option>
    </select>
  </label>
  <label class="check">legend <input id="legend" type="checkbox" checked></label>
  <button id="draw" class="primary">Draw</button>
  <span class="exports">
    <button id="download">Download SVG</button>
    <button id="bind">Bind as atlas</button>
  </span>
</div>

<p class="status" id="status" role="status" aria-live="polite"></p>
<div id="map"></div>
<p class="caption" id="caption"></p>
<div id="atlas"></div>

<footer>
  <a href="../">Home</a> · <a href="../faq/">FAQ</a> ·
  <a href="https://github.com/ahl-gram/Vellum">GitHub</a> ·
  CHARTS ARE DRAWN IN YOUR BROWSER — NOTHING IS UPLOADED
</footer>
</main>

<script type="module">
import { defaultRecipe, generateWorld } from "./engine/world/generate.js";
import { renderMap } from "./engine/render/map-renderer.js";
import { composeAtlas } from "./engine/atlas/compose.js";
import { escapeXml } from "./engine/render/svg.js";

const $ = (id) => document.getElementById(id);
const seedInput = $("seed");
const styleSel = $("style");
const typeSel = $("type");
const bandSel = $("band");
const themeSel = $("theme");
const legendChk = $("legend");
const status = $("status");
const mapDiv = $("map");
const caption = $("caption");
const atlasDiv = $("atlas");

let lastSvg = "";
let lastTitle = "";
let lastWorld = null;
let lastStyle = "antique";
let atlasUrls = [];

// Short captions for the style plates in the bound atlas (the composer's hero
// caption is a full sentence, too long for the grid alongside the others).
const STYLE_LABEL = {
  antique: "The antique chart",
  topographic: "Topographic survey",
  ink: "Pen & ink",
  nautical: "Sea chart: soundings & winds",
};

// Plates are embedded as <img> with blob URLs, never inline <svg>: every chart
// carries internal ids (map-clip, glyph/texture/label defs) referenced by
// url(#...), so injecting several inline into one document would collide them.
function clearAtlas() {
  for (const url of atlasUrls) URL.revokeObjectURL(url);
  atlasUrls = [];
  atlasDiv.innerHTML = "";
}

function plateFigure(svg, caption) {
  const url = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
  atlasUrls.push(url);
  const c = escapeXml(caption);
  return `<figure><img src="${url}" alt="${c}" loading="lazy"><figcaption>${c}</figcaption></figure>`;
}

function atlasHtml(atlas, currentStyle) {
  // The chart already on screen IS this world drawn in `currentStyle`, so the
  // atlas shows the OTHER draughtings, the surveys, and the lore — not a second
  // copy of what the reader is already looking at.
  const others = [atlas.hero, ...atlas.draughtings].filter(
    (p) => p.key !== currentStyle,
  );
  const draughtings = others
    .map((p) => plateFigure(p.svg, STYLE_LABEL[p.key] ?? p.title))
    .join("\n");
  const thematic = `<section><h2>Thematic Surveys</h2><div class="themes">${atlas.themes
    .map((t) => plateFigure(t.svg, t.title))
    .join("\n")}</div></section>`;
  const surveys = atlas.regions.length
    ? `<section><h2>Regional Surveys</h2>${atlas.regions
        .map((r) => plateFigure(r.svg, r.title))
        .join("\n")}</section>`
    : "";
  return `<section><h2>Other Draughtings</h2><div class="styles">${draughtings}</div></section>
${thematic}
${surveys}
${atlas.bannersHtml}
${atlas.gazetteerHtml}`;
}

function randomSeed() {
  return Math.floor(Math.random() * 0xffffffff);
}

function readHash() {
  const params = new URLSearchParams(location.hash.slice(1));
  const seed = Number(params.get("seed"));
  if (Number.isInteger(seed) && seed >= 0) seedInput.value = String(seed);
  const style = params.get("style");
  if (style && [...styleSel.options].some((o) => o.value === style)) {
    styleSel.value = style;
  }
  const type = params.get("type") ?? "";
  if ([...typeSel.options].some((o) => o.value === type)) typeSel.value = type;
  const band = params.get("band") ?? "";
  if ([...bandSel.options].some((o) => o.value === band)) bandSel.value = band;
  const theme = params.get("theme") ?? "";
  if ([...themeSel.options].some((o) => o.value === theme)) themeSel.value = theme;
  const legend = params.get("legend");
  if (legend !== null) legendChk.checked = legend === "1";
}

function writeHash() {
  const params = new URLSearchParams();
  params.set("seed", seedInput.value);
  params.set("style", styleSel.value);
  if (typeSel.value) params.set("type", typeSel.value);
  if (bandSel.value) params.set("band", bandSel.value);
  if (themeSel.value) params.set("theme", themeSel.value);
  params.set("legend", legendChk.checked ? "1" : "0");
  history.replaceState(null, "", "#" + params.toString());
}

function draw() {
  const seed = Number(seedInput.value) >>> 0;
  status.textContent = "Drafting…";
  caption.textContent = "";
  clearAtlas();
  writeHash();
  // let the status paint before the ~half-second of cartography
  setTimeout(() => {
    try {
      const t0 = performance.now();
      const overrides = {};
      if (typeSel.value) overrides.mapType = typeSel.value;
      if (bandSel.value) overrides.band = bandSel.value;
      const recipe = defaultRecipe(seed, overrides);
      const world = generateWorld(recipe);
      lastWorld = world;
      lastStyle = styleSel.value;
      lastSvg = renderMap(world, {
        style: lastStyle,
        widthPx: 1500,
        legend: legendChk.checked,
        theme: themeSel.value || undefined,
      });
      lastTitle = world.title.title;
      mapDiv.innerHTML = lastSvg;
      const ms = (performance.now() - t0).toFixed(0);
      status.textContent = "";
      caption.textContent =
        `${world.title.title} · ${recipe.mapType} · ${recipe.band} · drawn in ${ms}ms`;
    } catch (err) {
      status.textContent = "The cartographer spilled the ink: " + err.message;
    }
  }, 30);
}

$("draw").addEventListener("click", draw);
$("random").addEventListener("click", () => {
  seedInput.value = String(randomSeed());
  draw();
});
$("download").addEventListener("click", () => {
  if (!lastSvg) return;
  const blob = new Blob([lastSvg], { type: "image/svg+xml" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const slug = lastTitle.toLowerCase().replace(/[^a-z0-9]+/g, "-");
  a.download = `vellum-${seedInput.value}-${styleSel.value}-${slug}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
});
$("bind").addEventListener("click", () => {
  if (!lastWorld) return;
  clearAtlas();
  status.textContent = "Binding the atlas…";
  // let the status paint before the several renders + region surveys
  setTimeout(() => {
    try {
      const atlas = composeAtlas(lastWorld, { width: 1500 });
      atlasDiv.innerHTML = atlasHtml(atlas, lastStyle);
      status.textContent = "";
      atlasDiv.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (err) {
      status.textContent = "The bindery faltered: " + err.message;
    }
  }, 30);
});
seedInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") draw();
});
for (const sel of [styleSel, typeSel, bandSel, themeSel, legendChk]) {
  sel.addEventListener("change", draw);
}

seedInput.value = String(randomSeed());
readHash();
draw();
</script>
</body>
</html>
